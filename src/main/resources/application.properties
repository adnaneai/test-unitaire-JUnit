spring.application.name=gestionArticle
server.port=8085

#spring.datasource.url=jdbc:h2:mem:gestion_article;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.url=jdbc:mysql://localhost:3306/gestion_article?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
#spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# --- JPA ---
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# --- H2 Console (pour accéder via navigateur) ---
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# --- JSON formaté ---
spring.jackson.serialization.indent_output=true
